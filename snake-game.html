<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background-color: black;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #scoreBoard {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #gameOver {
            position: absolute;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            text-align: center;
            display: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="gameOver">
        <h1>Game Over!</h1>
        <p>Press 'R' to Restart</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreBoard");
        const gameOverElement = document.getElementById("gameOver");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameActive = true;
        let lastTime = 0;
        const gameSpeed = 100; // ms

        function main(currentTime) {
            if (!gameActive) return;

            if (currentTime - lastTime >= gameSpeed) {
                advanceSnake();
                checkGameOver();
                draw();
                lastTime = currentTime;
            }
            requestAnimationFrame(main);
        }

        function advanceSnake() {
            if (dx === 0 && dy === 0) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerHTML = `Score: ${score}`;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function checkGameOver() {
            const head = snake[0];

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
            }

            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                }
            }
        }

        function endGame() {
            gameActive = false;
            gameOverElement.style.display = "block";
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Ensure food doesn't spawn on snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = "red";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Draw snake
            ctx.fillStyle = "green";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function handleKeydown(e) {
            const key = e.key.toLowerCase();
            
            if (key === 'r') {
                restartGame();
                return;
            }

            if (!gameActive) return;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((key === 'arrowup' || key === 'w') && !goingDown) {
                dx = 0; dy = -1;
            }
            if ((key === 'arrowdown' || key === 's') && !goingUp) {
                dx = 0; dy = 1;
            }
            if ((key === 'arrowleft' || key === 'a') && !goingRight) {
                dx = -1; dy = 0;
            }
            if ((key === 'arrowright' || key === 'd') && !goingLeft) {
                dx = 1; dy = 0;
            }
        }

        function restartGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerHTML = `Score: 0`;
            gameActive = true;
            gameOverElement.style.display = "none";
            generateFood();
            requestAnimationFrame(main);
        }

        window.addEventListener("keydown", handleKeydown);
        generateFood();
        requestAnimationFrame(main);
    </script>
</body>
</html>
